name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1
  NX_NO_CLOUD: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ebms: ${{ steps.filter.outputs.ebms }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed deploy targets
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ebms:
              - 'apps/ebms/**'
              - 'libs/shadcn/**'
              - 'package.json'
              - 'yarn.lock'
              - 'nx.json'
            worker:
              - 'apps/worker/**'
              - 'package.json'
              - 'yarn.lock'

  deploy-ebms:
    name: Deploy ebms to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ebms == 'true'
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build ebms static export
        run: yarn workspace ebms build

      - name: Deploy ebms to Pages
        run: npx wrangler pages deploy apps/ebms/out --project-name ebms
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-worker:
    name: Deploy worker to Cloudflare
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Deploy worker with Wrangler
        run: npx wrangler deploy --config apps/worker/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
